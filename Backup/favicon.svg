<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.4; transform: scale(0.65); }
      }
      .dot {
        animation: pulse 2s ease-in-out infinite;
        transform-origin: 50px 50px;
        transform-box: fill-box;
      }
    </style>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f0eeff"/>
      <stop offset="60%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#7c5cfc" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
    <filter id="dot-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="100" height="100" fill="#0c0c10"/>
  <rect width="100" height="100" fill="url(#bg-glow)"/>

  <!-- O gauche (Open) -->
  <text x="26" y="50"
        font-family="'Syne', sans-serif" font-weight="800" font-size="48"
        text-anchor="middle" dominant-baseline="central"
        fill="url(#grad)">O</text>

  <!-- Dot central -->
  <circle class="dot" cx="50" cy="50" r="4.5"
          fill="#7c5cfc" filter="url(#dot-glow)"/>

  <!-- O droit (Overlay) -->
  <text x="74" y="50"
        font-family="'Syne', sans-serif" font-weight="800" font-size="48"
        text-anchor="middle" dominant-baseline="central"
        fill="url(#grad)">O</text>
</svg>
